<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Web | Agar.io</title>
    <link rel="stylesheet" href="gamepg.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">Agar.io</h1>
            <div class="controls">
                <a href="index.html" class="control-btn">← Home</a>
                <a href="developers.html" class="control-btn">Developers</a>
                <button class="control-btn" onclick="toggleFullscreen()">Fullscreen</button>
            </div>
        </div>

        <div class="game-frame" id="gameFrame">
            <div class="loading-message" id="loadingMessage">
                <div class="loading-spinner"></div>
                <p>Loading game...</p>
            </div>
            <!-- Replace 'your-game-file.html' with your actual game file -->
            <iframe id="gameIframe" src="your-game-file.html" onload="hideLoading()"></iframe>
        </div>
    </div>

    <div class="fullscreen-controls">
        <button class="exit-fullscreen-btn" onclick="exitFullscreen()">Exit Fullscreen</button>
    </div>

    <script>
        function hideLoading() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) {
                loadingMessage.style.display = 'none';
            }
        }

        function toggleFullscreen() {
            const gameFrame = document.getElementById('gameFrame');
            
            if (!document.fullscreenElement) {
                gameFrame.requestFullscreen().then(() => {
                    gameFrame.classList.add('fullscreen-active');
                }).catch(err => {
                    console.log('Error attempting to enable fullscreen:', err.message);
                });
            } else {
                exitFullscreen();
            }
        }

        function exitFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen().then(() => {
                    const gameFrame = document.getElementById('gameFrame');
                    gameFrame.classList.remove('fullscreen-active');
                });
            }
        }

        // Listen for fullscreen changes
        document.addEventListener('fullscreenchange', function() {
            const gameFrame = document.getElementById('gameFrame');
            if (!document.fullscreenElement) {
                gameFrame.classList.remove('fullscreen-active');
            }
        });

        // Handle escape key to exit fullscreen
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' && document.fullscreenElement) {
                exitFullscreen();
            }
        });

        // Error handling for iframe loading
        document.getElementById('gameIframe').addEventListener('error', function() {
            const loadingMessage = document.getElementById('loadingMessage');
            loadingMessage.innerHTML = '<p>Failed to load game. Please check if the game file exists.</p>';
        });
    </script>
</body>
</html>
