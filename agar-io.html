<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Web | Agar.io</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000066 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .game-header {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #6600cc;
            z-index: 1000;
        }

        .game-title {
            font-size: 1.5rem;
            color: #9966ff;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .control-btn {
            background: linear-gradient(45deg, #6600cc, #3333aa);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .control-btn:hover {
            background: linear-gradient(45deg, #7722dd, #4444bb);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 0, 204, 0.4);
        }

        .game-frame {
            flex: 1;
            position: relative;
            background: #111111;
            border: 3px solid #3333aa;
            margin: 10px;
            border-radius: 10px;
            overflow: hidden;
        }

        #gameIframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000000;
        }

        .loading-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #9966ff;
            font-size: 1.2rem;
            z-index: 100;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #3333aa;
            border-top: 4px solid #9966ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fullscreen-active {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999 !important;
            margin: 0 !important;
            border: none !important;
            border-radius: 0 !important;
        }

        .fullscreen-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: none;
        }

        .fullscreen-active ~ .fullscreen-controls {
            display: block;
        }

        .exit-fullscreen-btn {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border: 2px solid #6600cc;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .exit-fullscreen-btn:hover {
            background: rgba(102, 0, 204, 0.8);
        }

        @media (max-width: 768px) {
            .game-header {
                padding: 10px 15px;
            }
            
            .game-title {
                font-size: 1.2rem;
            }
            
            .controls {
                gap: 10px;
            }
            
            .control-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            
            .game-frame {
                margin: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">Your Game Title</h1>
            <div class="controls">
                <a href="index.html" class="control-btn">← Home</a>
                <button class="control-btn" onclick="toggleFullscreen()">Fullscreen</button>
            </div>
        </div>

        <div class="game-frame" id="gameFrame">
            <div class="loading-message" id="loadingMessage">
                <div class="loading-spinner"></div>
                <p>Loading game...</p>
            </div>
            <!-- Replace 'your-game-file.html' with your actual game file -->
            <iframe id="gameIframe" src="agar-io.html" onload="hideLoading()"></iframe>
        </div>
    </div>

    <div class="fullscreen-controls">
        <button class="exit-fullscreen-btn" onclick="exitFullscreen()">Exit Fullscreen</button>
    </div>

    <script>
        function hideLoading() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) {
                loadingMessage.style.display = 'none';
            }
        }

        function toggleFullscreen() {
            const gameFrame = document.getElementById('gameFrame');
            
            if (!document.fullscreenElement) {
                gameFrame.requestFullscreen().then(() => {
                    gameFrame.classList.add('fullscreen-active');
                }).catch(err => {
                    console.log('Error attempting to enable fullscreen:', err.message);
                });
            } else {
                exitFullscreen();
            }
        }

        function exitFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen().then(() => {
                    const gameFrame = document.getElementById('gameFrame');
                    gameFrame.classList.remove('fullscreen-active');
                });
            }
        }

        // Listen for fullscreen changes
        document.addEventListener('fullscreenchange', function() {
            const gameFrame = document.getElementById('gameFrame');
            if (!document.fullscreenElement) {
                gameFrame.classList.remove('fullscreen-active');
            }
        });

        // Handle escape key to exit fullscreen
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' && document.fullscreenElement) {
                exitFullscreen();
            }
        });

        // Error handling for iframe loading
        document.getElementById('gameIframe').addEventListener('error', function() {
            const loadingMessage = document.getElementById('loadingMessage');
            loadingMessage.innerHTML = '<p>Failed to load game. Please check if the game file exists.</p>';
        });
    </script>
</body>
</html>
