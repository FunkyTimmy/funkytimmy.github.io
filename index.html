    <style>
        /* Your website content container */
        #main-content {
            transition: filter 0.5s;
        }

        /* Blur overlay */
        #blur-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            background: rgba(0, 0, 0, 0.3);
            display: none;
            z-index: 999;
        }

        /* Popup styling */
        #break-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            z-index: 1000;
            display: none;
            min-width: 300px;
        }

        #timer {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(45deg, #2c3e50, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 1rem 0;
        }

        .popup-text {
            color: #2c3e50;
            margin: 1rem 0;
        }
    </style>

  // Pause and resume on page becoming visible/invisible
  function onVisibilityChanged() {
   if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
    cr_setSuspended(true);
   else
    cr_setSuspended(false);
  };
  
  document.addEventListener("visibilitychange", onVisibilityChanged, false);
  document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
  document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
  document.addEventListener("msvisibilitychange", onVisibilityChanged, false);
  
  function OnRegisterSWError(e)
  {
   console.warn("Failed to register service worker: ", e);
  };
  
  // Runtime calls this global method when ready to start caching (i.e. after startup).
  // This registers the service worker which caches resources for offline support.
  window.C2_RegisterSW = function C2_RegisterSW()
  {
   if (!navigator.serviceWorker)
    return;  // no SW support, ignore call
   
   try {
    navigator.serviceWorker.register("sw.js", { scope: "./" })
    .then(function (reg)
    {
     console.log("Registered service worker on " + reg.scope);
    })
    .catch(OnRegisterSWError);
   }
   catch (e)
   {
    OnRegisterSWError(e);

  };

    <!-- Break popup -->
    <div id="break-popup">
        <h2 class="popup-text">⏰ Time for a Break!</h2>
        <div id="timer">05:00</div>
        <p class="popup-text">Resuming in...</p>
    </div>

    <script>
        let timer  = 10 * 60 * 1000
        let breakTimer;
        let remainingTime = 5 * 60; // 5 minutes in seconds

        function showBreakPopup() {
            document.getElementById('blur-overlay').style.display = 'block';
            document.getElementById('break-popup').style.display = 'block';
            startCountdown();
        }

        function startCountdown() {
            breakTimer = setInterval(() => {
                remainingTime--;
                const minutes = Math.floor(remainingTime / 60).toString().padStart(2, '0');
                const seconds = (remainingTime % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${minutes}:${seconds}`;

                if (remainingTime <= 0) {
                    clearInterval(breakTimer);
                    document.getElementById('blur-overlay').style.display = 'none';
                    document.getElementById('break-popup').style.display = 'none';
                    remainingTime = 300;
                    setTimeout(showBreakPopup, timer); // Restart 10-minute timer
                }
            }, 1000);
        }

        // Initial timer start (10 minutes)
        setTimeout(showBreakPopup, timer);
    </script>
