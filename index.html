<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Home</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .navbar {
            background-color: #333;
            overflow: hidden;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
            font-size: 17px;
        }
        
        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }
        
        .content {
            margin-top: 60px;
            padding: 20px;
            text-align: center;
        }
        
        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .game-card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 200px;
            padding: 15px;
            transition: transform 0.3s;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
        }
        
        .game-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
        }
        
        .game-card h3 {
            margin: 10px 0;
        }
        
        .game-card a {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="game.html?game=game1">Game 1</a>
        <a href="game.html?game=game2">Game 2</a>
        <a href="game.html?game=game3">Game 3</a>
    </div>
    
    <div class="content">
        <h1>Welcome to Game Hub</h1>
        <p>Click on a game from the navigation bar or below to start playing!</p>
        
        <div class="game-container">
            <div class="game-card">
                <img src="https://via.placeholder.com/200x120?text=Game+1" alt="Game 1">
                <h3>Game 1</h3>
                <a href="game.html?game=game1">Play Now</a>
            </div>
            
            <div class="game-card">
                <img src="https://via.placeholder.com/200x120?text=Game+2" alt="Game 2">
                <h3>Game 2</h3>
                <a href="game.html?game=game2">Play Now</a>
            </div>
            
            <div class="game-card">
                <img src="https://via.placeholder.com/200x120?text=Game+3" alt="Game 3">
                <h3>Game 3</h3>
                <a href="game.html?game=game3">Play Now</a>
            </div>
        </div>
    </div>
</body>
</html>
