<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Web | Minecraft</title>
    <link rel="stylesheet" href="gamepg.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">Minecraft</h1>
            <div class="controls">
                <a href="https://test-gules-one-58.vercel.app/" class="control-btn">← Home</a>
                <a href="developers.html" class="control-btn">Developers</a>
                <button class="control-btn" onclick="toggleFullscreen()">Fullscreen</button>
            </div>
        </div>

        <div class="game-frame" id="gameFrame">
            <div class="loading-message" id="loadingMessage">
                <div class="loading-spinner"></div>
                <p>Loading game...</p>
            </div>
            <!-- Replace the text in src="(game).html" with the game file -->
            <iframe id="gameIframe" src="minecraft-src.html" onload="hideLoading()"></iframe>
        </div>
    </div>

    <div class="fullscreen-controls">
        <button class="exit-fullscreen-btn" onclick="exitFullscreen()">Exit Fullscreen</button>
    </div>

    <script src="websrc.js"></script>
</body>
</html>
